<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Banca Jarvis</title>
<link rel="manifest" href="manifest.json" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#1d4ed8" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<style>
  :root {
    --bg: #0f172a;
    --card: #ffffff;
    --text: #1e293b;
    --muted: #64748b;
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --danger: #dc2626;
    --neutral: #64748b;
    --border: #e2e8f0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    background: linear-gradient(180deg, var(--bg) 0%, #1e293b 160px, #f1f5f9 160px, #f1f5f9 100%);
    color: var(--text);
    min-height: 100vh;
  }
  header { padding: 28px 20px 16px; text-align: center; color: #fff; }
  header .logo { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  header .tagline { font-size: 13px; color: #cbd5e1; margin-top: 4px; }
  .container { max-width: 420px; margin: 0 auto; padding: 0 16px 32px; }
  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 18px;
    margin-top: 16px;
    box-shadow: 0 4px 16px rgba(15, 23, 42, 0.08);
    border: 1px solid var(--border);
  }
  .card h3 {
    margin: 0 0 12px;
    font-size: 13px;
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  input[type="text"], input:not([type]) {
    width: 100%;
    font-size: 14px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #f8fafc;
    color: var(--text);
  }
  input:focus { outline: 2px solid var(--primary); border-color: transparent; }
  button {
    font-size: 16px;
    font-weight: 600;
    padding: 14px 18px;
    border-radius: 12px;
    border: none;
    color: #fff;
    width: 100%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform 0.05s ease, opacity 0.15s ease;
  }
  button:active { transform: scale(0.98); opacity: 0.9; }
  .btn-row { display: flex; flex-direction: column; gap: 10px; }
  .btn-primary { background: var(--primary); }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-neutral { background: var(--neutral); }
  .btn-ghost { background: #fff; color: var(--danger); border: 1px solid #fecaca; }
  .btn-stop { background: #fff; color: var(--primary-dark); border: 1px solid #bfdbfe; display: none; }
  .btn-stop.visible { display: flex; }
  .status-box {
    margin-top: 12px;
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
    background: #f8fafc;
    border-radius: 10px;
    padding: 10px 12px;
    display: none;
  }
  .status-box.visible { display: block; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.5; }

  /* 검토/수정 폼 */
  .field-group { margin-bottom: 14px; }
  .field-group:last-child { margin-bottom: 0; }
  .field-group label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .field-group textarea {
    width: 100%;
    font-size: 15px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #f8fafc;
    color: var(--text);
    resize: vertical;
    min-height: 38px;
    font-family: inherit;
  }
  .field-group textarea:focus { outline: 2px solid var(--primary); border-color: transparent; }
  .section-divider {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin: 16px 0 8px;
    font-weight: 700;
  }
  .section-divider:first-child { margin-top: 0; }

  /* 달력 */
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .cal-nav button { width: auto; padding: 8px 14px; font-size: 14px; }
  .cal-title { font-size: 15px; font-weight: 700; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-cell {
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    font-size: 13px;
    background: #f8fafc;
    color: var(--text);
    cursor: pointer;
    border: 1px solid transparent;
  }
  .cal-cell.empty { background: transparent; cursor: default; }
  .cal-cell.selected { background: var(--primary); color: #fff; }
  .cal-day-label { font-size: 11px; color: var(--muted); text-align: center; }
  #calendarResult { margin-top: 14px; font-size: 13.5px; line-height: 1.6; }
  .visit-item { padding: 8px 0; border-bottom: 1px solid var(--border); }
  .visit-item:last-child { border-bottom: none; }

  /* 제안서 */
  .proposal-card-item {
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 12px;
  }
  .proposal-card-item .meta { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .status-pill {
    display: inline-block;
    font-size: 12px;
    font-weight: 700;
    padding: 6px 12px;
    border-radius: 999px;
    cursor: pointer;
    width: auto;
  }
  .status-pill.대기 { background: #fef3c7; color: #92400e; }
  .status-pill.완료 { background: #dcfce7; color: #166534; }
  .proposal-card-item .small-save {
    width: auto;
    padding: 8px 12px;
    font-size: 13px;
    background: var(--primary);
    margin-top: 8px;
  }

  details.settings { margin-top: 24px; }
  details.settings summary {
    text-align: center;
    font-size: 11px;
    color: #94a3b8;
    cursor: pointer;
    padding: 8px;
  }
</style>
</head>
<body>
  <header>
    <div class="logo">Banca Jarvis</div>
    <div class="tagline">방카슈랑스 영업 보조 어시스턴트</div>
  </header>

  <div class="container">
    <div class="card">
      <h3>정보 기록</h3>
      <div class="btn-row">
        <button id="recordBtn" class="btn-primary">🎤 방문 기록 남기기</button>
        <button id="cancelBtn" class="btn-ghost">녹음 취소</button>
      </div>
      <div class="hint">"기록"이나 "시작"이 들어간 말만 해도 시작됩니다. 끝낼 땐 "완료"나 "여기까지", 취소는 "취소"나 "다시"가 들어간 말.</div>
      <div id="recordStatus" class="status-box"></div>
    </div>

    <div class="card" id="editCard" style="display:none;">
      <h3>인식된 내용 확인 / 수정</h3>
      <div id="editForm"></div>
      <div class="btn-row" style="margin-top:14px;">
        <button id="commitBtn" class="btn-primary">✓ 이대로 저장</button>
        <button id="discardBtn" class="btn-ghost">취소 (저장 안 함)</button>
      </div>
    </div>

    <div class="card">
      <h3>지점 조회</h3>
      <div class="btn-row">
        <button id="queryBtn" class="btn-neutral">🏦 지점명 말하기</button>
        <button id="stopListenBtn" class="btn-stop">음성 듣기 종료</button>
      </div>
      <div class="hint">"지점조회"/"조회"/"브리핑"이라고 말만 해도 시작됩니다. 은행+지점(+판매자명) 말한 뒤 "브리핑"이 들어간 말을 하면 바로 시작. 멈추려면 버튼 또는 "오케이"/"여기까지".</div>
      <div id="queryStatus" class="status-box"></div>
    </div>

    <div class="card">
      <h3>방문 달력</h3>
      <div class="cal-nav">
        <button id="calPrev" class="btn-neutral">‹ 이전</button>
        <div class="cal-title" id="calTitle"></div>
        <button id="calNext" class="btn-neutral">다음 ›</button>
      </div>
      <div class="cal-grid" id="calDayLabels"></div>
      <div class="cal-grid" id="calGrid" style="margin-top:4px;"></div>
      <div id="calendarResult"></div>
    </div>

    <div class="card">
      <h3>제안서 요청 현황</h3>
      <button id="refreshProposalsBtn" class="btn-neutral" style="margin-bottom:12px;">↻ 새로고침</button>
      <div id="proposalList"></div>
    </div>

    <details class="settings">
      <summary>연결 설정</summary>
      <input id="webAppUrl" type="text" placeholder="Apps Script 웹앱 URL" />
    </details>
  </div>

  <script>
    const urlInput = document.getElementById('webAppUrl');
    const stopListenBtn = document.getElementById('stopListenBtn');
    const editCard = document.getElementById('editCard');
    const editForm = document.getElementById('editForm');
    const recordStatusEl = document.getElementById('recordStatus');
    const queryStatusEl = document.getElementById('queryStatus');
    urlInput.value = localStorage.getItem('webAppUrl') || '';
    urlInput.addEventListener('change', () => localStorage.setItem('webAppUrl', urlInput.value));

    function stripSymbols(text) {
      return String(text || '')
        .replace(/[#*_`>{}\[\]\\|~^]/g, '')
        .replace(/^[\s-]+/gm, '')
        .replace(/[ \t]{2,}/g, ' ')
        .trim();
    }

    function showStatus(el, text) {
      el.textContent = stripSymbols(text);
      el.classList.add('visible');
    }
    function hideStatus(el) {
      el.classList.remove('visible');
      el.textContent = '';
    }
    const setRecordStatus = (t) => showStatus(recordStatusEl, t);
    const clearRecordStatus = () => hideStatus(recordStatusEl);
    const setQueryStatus = (t) => showStatus(queryStatusEl, t);
    const clearQueryStatus = () => hideStatus(queryStatusEl);

    function speak(text) {
      const u = new SpeechSynthesisUtterance(stripSymbols(text));
      u.lang = 'ko-KR';
      speechSynthesis.cancel();
      speechSynthesis.speak(u);
    }

    let jsonpCounter = 0;
    function jsonpRequest(baseUrl, params, onData) {
      const callbackName = 'jsonpCb' + (jsonpCounter++);
      const timeout = setTimeout(() => { cleanup(); onData({ error: '응답 시간 초과 (URL 또는 배포 설정을 확인하세요)' }); }, 20000);
      function cleanup() { clearTimeout(timeout); delete window[callbackName]; script.remove(); }
      window[callbackName] = (data) => { cleanup(); onData(data); };
      const qs = new URLSearchParams({ ...params, callback: callbackName }).toString();
      const script = document.createElement('script');
      script.src = baseUrl + (baseUrl.indexOf('?') >= 0 ? '&' : '?') + qs;
      script.onerror = () => { cleanup(); onData({ error: '요청 실패 (URL을 확인하세요)' }); };
      document.body.appendChild(script);
    }

    // ===================== 항상 듣고 있는 대기 모드 (버튼 없이 음성으로 시작) =====================
    let appState = 'idle'; // idle | recording | querying
    let wakeRecognition = null;
    const START_RECORD_PHRASES = ['기록', '시작'];
    const START_QUERY_PHRASES = ['지점조회', '조회', '브리핑'];

    function pauseWakeListener() {
      if (wakeRecognition) { try { wakeRecognition.stop(); } catch (e) {} wakeRecognition = null; }
    }

    function resumeWakeListener() {
      if (appState !== 'idle') return;
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) return;
      const rec = new SpeechRecognition();
      wakeRecognition = rec;
      rec.lang = 'ko-KR';
      rec.continuous = true;
      rec.interimResults = false;
      rec.onresult = (e) => {
        for (let i = e.resultIndex; i < e.results.length; i++) {
          if (!e.results[i].isFinal) continue;
          const t = e.results[i][0].transcript;
          if (START_RECORD_PHRASES.some((p) => t.indexOf(p) !== -1)) { pauseWakeListener(); document.getElementById('recordBtn').click(); return; }
          if (START_QUERY_PHRASES.some((p) => t.indexOf(p) !== -1)) { pauseWakeListener(); document.getElementById('queryBtn').click(); return; }
        }
      };
      rec.onerror = () => {};
      rec.onend = () => { if (wakeRecognition === rec && appState === 'idle') { try { rec.start(); } catch (e) {} } };
      try { rec.start(); } catch (e) {}
    }

    // ===================== 음성 기록 결과를 항목별로 화면에 보여주고, 수정 가능하게 함 =====================
    const FIELD_SECTIONS = [
      { title: '기본 정보 (수정해도 시트의 은행/지점/판매자는 유지됩니다)', fields: [
        ['은행명', '은행명'], ['지점명', '지점명'], ['판매자명', '판매자명'], ['직책', '직책']
      ] },
      { title: '판매자 특성', fields: [
        ['가족관계', '가족관계'], ['자택', '자택'], ['판매성향', '판매성향']
      ] },
      { title: '대화 내용', fields: [
        ['방문이력', '방문이력'], ['기타대화내용', '기타대화내용']
      ] }
    ];
    const PROPOSAL_FIELDS = [
      ['상품명', '상품명'], ['가입금액', '가입금액'], ['고객성명', '고객성명'], ['고객나이', '고객나이'], ['고객성별', '고객성별']
    ];

    function renderEditForm(parsed) {
      editForm.innerHTML = '';
      FIELD_SECTIONS.forEach((section) => {
        const div = document.createElement('div');
        div.className = 'section-divider';
        div.textContent = section.title;
        editForm.appendChild(div);
        section.fields.forEach(([key, label]) => editForm.appendChild(buildField(key, label, parsed[key] || '')));
      });
      const hasProposal = parsed.proposal_request && parsed.proposal_request['있음'];
      const pDiv = document.createElement('div');
      pDiv.className = 'section-divider';
      pDiv.textContent = '제안서 요청' + (hasProposal ? '' : ' (감지되지 않음)');
      editForm.appendChild(pDiv);
      PROPOSAL_FIELDS.forEach(([key, label]) => {
        const val = (parsed.proposal_request && parsed.proposal_request[key]) || '';
        editForm.appendChild(buildField('proposal_' + key, label, val));
      });
      editCard.style.display = 'block';
      editCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
      startEditAutoFlow();
    }

    const SAVE_PHRASES = ['이대로 저장', '저장해줘', '저장할게', '저장'];
    const DISCARD_PHRASES = ['저장 취소', '취소해줘', '저장하지마', '취소'];
    let editAutoTimer = null;
    let editVoiceCleanup = null;

    function stopEditAutoFlow() {
      if (editAutoTimer) { clearTimeout(editAutoTimer); editAutoTimer = null; }
      if (editVoiceCleanup) { editVoiceCleanup(); editVoiceCleanup = null; }
    }

    function startEditAutoFlow() {
      stopEditAutoFlow();
      editAutoTimer = setTimeout(() => {
        if (editCard.style.display !== 'none') {
          setRecordStatus('5분간 응답이 없어 인식된 내용 그대로 저장합니다.');
          document.getElementById('commitBtn').click();
        }
      }, 5 * 60 * 1000);

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) return;
      let active = true;
      const recog = new SpeechRecognition();
      recog.lang = 'ko-KR';
      recog.continuous = true;
      recog.interimResults = false;
      recog.onresult = (e) => {
        for (let i = e.resultIndex; i < e.results.length; i++) {
          if (!e.results[i].isFinal) continue;
          const t = e.results[i][0].transcript;
          if (DISCARD_PHRASES.some((p) => t.indexOf(p) !== -1)) { document.getElementById('discardBtn').click(); return; }
          if (SAVE_PHRASES.some((p) => t.indexOf(p) !== -1)) { document.getElementById('commitBtn').click(); return; }
        }
      };
      recog.onerror = () => {};
      recog.onend = () => { if (active) { try { recog.start(); } catch (e) {} } };
      try { recog.start(); } catch (e) {}
      editVoiceCleanup = () => { active = false; try { recog.stop(); } catch (e) {} };
    }

    function buildField(key, label, value) {
      const wrap = document.createElement('div');
      wrap.className = 'field-group';
      const labelEl = document.createElement('label');
      labelEl.textContent = label;
      const input = document.createElement('textarea');
      input.id = 'field_' + key;
      input.rows = 1;
      input.value = stripSymbols(value);
      input.addEventListener('input', () => { input.rows = Math.min(6, Math.max(1, Math.ceil(input.value.length / 28))); });
      wrap.appendChild(labelEl);
      wrap.appendChild(input);
      return wrap;
    }

    function collectEditedData() {
      const get = (key) => document.getElementById('field_' + key).value.trim();
      return {
        은행명: get('은행명'), 지점명: get('지점명'), 판매자명: get('판매자명'), 직책: get('직책'),
        가족관계: get('가족관계'), 자택: get('자택'), 판매성향: get('판매성향'),
        방문이력: get('방문이력'), 기타대화내용: get('기타대화내용'),
        proposal_request: {
          있음: !!(get('proposal_상품명') || get('proposal_고객성명')),
          상품명: get('proposal_상품명'), 가입금액: get('proposal_가입금액'),
          고객성명: get('proposal_고객성명'), 고객나이: get('proposal_고객나이'), 고객성별: get('proposal_고객성별')
        }
      };
    }

    function formatSaved(saved) {
      if (!saved) return '';
      const order = ['은행명', '지점명', '판매자명', '직책', '가족관계', '자택', '판매성향', '방문이력', '기타대화내용'];
      const labels = order.filter((k) => saved[k]).map((k) => k + ': ' + stripSymbols(saved[k]));
      if (saved.proposal_request && saved.proposal_request['있음']) {
        labels.push('제안서 요청: 있음');
        ['상품명', '가입금액', '고객성명', '고객나이', '고객성별'].forEach((k) => {
          if (saved.proposal_request[k]) labels.push('  ' + k + ': ' + stripSymbols(saved.proposal_request[k]));
        });
      }
      return labels.join('\n');
    }

    document.getElementById('commitBtn').onclick = () => {
      stopEditAutoFlow();
      const data = collectEditedData();
      const url = urlInput.value.trim();
      if (!url) { setRecordStatus('먼저 연결 설정에서 Apps Script 웹앱 URL을 입력하세요.'); return; }
      setRecordStatus('저장 중...');
      jsonpRequest(url, { action: 'commit', data: JSON.stringify(data) }, (res) => {
        if (res.error) { setRecordStatus('오류: ' + res.error); return; }
        editCard.style.display = 'none';
        setRecordStatus('기록 완료\n\n' + formatSaved(res.saved));
        speak('기록했습니다.');
        appState = 'idle';
        resumeWakeListener();
      });
    };

    document.getElementById('discardBtn').onclick = () => {
      stopEditAutoFlow();
      editCard.style.display = 'none';
      setRecordStatus('저장하지 않고 취소했습니다.');
      appState = 'idle';
      resumeWakeListener();
    };

    // ===================== 지점 조회 음성 브리핑 =====================
    const LISTEN_STOP_PHRASES = ['오케이', '여기까지'];

    function speakSummary(text) {
      const clean = stripSymbols(text);
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      let stopRec = null;
      let active = true;
      function cleanupAll() {
        active = false;
        stopListenBtn.classList.remove('visible');
        if (stopRec) { try { stopRec.stop(); } catch (e) {} }
        appState = 'idle';
        resumeWakeListener();
      }
      stopListenBtn.classList.add('visible');
      stopListenBtn.onclick = () => { speechSynthesis.cancel(); cleanupAll(); };
      if (SpeechRecognition) {
        stopRec = new SpeechRecognition();
        stopRec.lang = 'ko-KR';
        stopRec.continuous = true;
        stopRec.interimResults = false;
        stopRec.onresult = (e) => {
          for (let i = e.resultIndex; i < e.results.length; i++) {
            if (!e.results[i].isFinal) continue;
            const t = e.results[i][0].transcript;
            if (LISTEN_STOP_PHRASES.some((p) => t.indexOf(p) !== -1)) { speechSynthesis.cancel(); cleanupAll(); return; }
          }
        };
        stopRec.onerror = () => {};
        stopRec.onend = () => { if (active) { try { stopRec.start(); } catch (e) {} } };
        try { stopRec.start(); } catch (e) {}
      }
      const u = new SpeechSynthesisUtterance(clean);
      u.lang = 'ko-KR';
      u.onend = cleanupAll;
      u.onerror = cleanupAll;
      speechSynthesis.cancel();
      speechSynthesis.speak(u);
    }

    // ===================== 녹음/조회 음성 캡처 (공용) =====================
    function createToggleRecorder(btn, onFinish, opts) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const setStatusFn = opts.setStatus;
      if (!SpeechRecognition) {
        setStatusFn('이 브라우저는 음성인식을 지원하지 않습니다. 크롬을 사용하세요.');
        return { cancel: () => {}, start: () => {} };
      }

      let rec = null;
      let listening = false;
      let manualStop = false;
      let cancelled = false;
      let chunks = [];
      const defaultLabel = btn.textContent;

      function stripPhrase(text, phrases) {
        let found = false;
        let cleaned = text;
        phrases.forEach((p) => {
          if (cleaned.indexOf(p) !== -1) { found = true; cleaned = cleaned.replace(p, '').trim(); }
        });
        return { found, cleaned };
      }

      function finish() { manualStop = true; if (rec) rec.stop(); }
      function cancel() {
        if (!listening) return;
        cancelled = true;
        manualStop = true;
        if (rec) rec.stop();
      }

      function start() {
        pauseWakeListener();
        appState = opts.stateName;
        chunks = [];
        manualStop = false;
        cancelled = false;
        listening = true;
        btn.textContent = opts.listeningLabel || '⏹ 입력완료 (다시 누르면 종료)';
        setStatusFn('듣고 있습니다...');

        rec = new SpeechRecognition();
        rec.lang = 'ko-KR';
        rec.continuous = true;
        rec.interimResults = true;

        rec.onresult = (e) => {
          let interim = '';
          for (let i = e.resultIndex; i < e.results.length; i++) {
            if (!e.results[i].isFinal) { interim += e.results[i][0].transcript; continue; }
            const raw = e.results[i][0].transcript;
            const cancelCheck = stripPhrase(raw, opts.cancelPhrases);
            if (cancelCheck.found) { cancel(); return; }
            const { found: stopped, cleaned } = stripPhrase(raw, opts.stopPhrases);
            if (cleaned) chunks.push(cleaned);
            if (stopped) { finish(); return; }
          }
          setStatusFn('듣고 있습니다...\n' + (chunks.join(' ') + ' ' + interim).trim());
        };

        rec.onerror = (e) => { if (e.error !== 'no-speech') setStatusFn('인식 오류: ' + e.error); };

        rec.onend = () => {
          if (!manualStop && listening) { rec.start(); return; }
          listening = false;
          btn.textContent = defaultLabel;
          if (cancelled) {
            setStatusFn('취소했습니다.');
            appState = 'idle';
            resumeWakeListener();
            return;
          }
          const fullText = chunks.join(' ').trim();
          if (fullText) onFinish(fullText);
          else { setStatusFn('인식된 내용이 없습니다.'); appState = 'idle'; resumeWakeListener(); }
        };

        rec.start();
      }

      btn.onclick = () => { if (!listening) start(); else finish(); };
      return { cancel, start };
    }

    function buildBriefSummary(parsed) {
      const lead = ['은행명', '지점명', '판매자명', '직책'].map((k) => parsed[k]).filter(Boolean).join(' ');
      const extra = [];
      if (parsed['가족관계']) extra.push('가족관계는 ' + parsed['가족관계']);
      if (parsed['자택']) extra.push('자택은 ' + parsed['자택']);
      if (parsed['판매성향']) extra.push('판매성향은 ' + parsed['판매성향']);
      if (parsed['방문이력']) extra.push('방문이력은 ' + parsed['방문이력']);
      if (parsed['기타대화내용']) extra.push('기타로 ' + parsed['기타대화내용']);
      let body = lead ? lead + '으로 인식했습니다.' : '내용을 인식했습니다.';
      if (extra.length) body += ' ' + extra.join(', ') + '.';
      return body;
    }

    const NO_CORRECTION_PHRASES = ['없음', '없어요', '없습니다', '없어', '괜찮아요', '괜찮습니다'];

    function listenOnceForCorrection(onResult) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) { onResult('없음'); return; }
      const rec = new SpeechRecognition();
      rec.lang = 'ko-KR';
      rec.interimResults = false;
      rec.continuous = false;
      let done = false;
      rec.onresult = (e) => { done = true; onResult(e.results[0][0].transcript); };
      rec.onerror = () => { if (!done) { done = true; onResult('없음'); } };
      rec.onend = () => { if (!done) { done = true; onResult('없음'); } };
      try { rec.start(); } catch (e) { onResult('없음'); }
    }

    function speakThenListen(message, onResult) {
      setRecordStatus(message);
      const u = new SpeechSynthesisUtterance(stripSymbols(message));
      u.lang = 'ko-KR';
      u.onend = () => listenOnceForCorrection(onResult);
      speechSynthesis.cancel();
      speechSynthesis.speak(u);
    }

    function askForCorrection(originalTranscript, parsed) {
      const msg = buildBriefSummary(parsed) + ' 정정하실 사항이 있으신가요? 없으면 없음이라고 말씀해주세요.';
      speakThenListen(msg, (correctionText) => {
        if (NO_CORRECTION_PHRASES.some((p) => correctionText.indexOf(p) !== -1)) {
          setRecordStatus('아래에서 내용을 확인하고 수정한 뒤 저장하세요.');
          renderEditForm(parsed);
          return;
        }
        const url = urlInput.value.trim();
        setRecordStatus('정정 내용을 반영하는 중...\n"' + correctionText + '"');
        jsonpRequest(url, { action: 'reparse', original: originalTranscript, correction: correctionText }, (data2) => {
          if (data2.error) { setRecordStatus('오류: ' + data2.error); renderEditForm(parsed); return; }
          setRecordStatus('아래에서 내용을 확인하고 수정한 뒤 저장하세요.');
          renderEditForm(data2.parsed);
        });
      });
    }

    function handleRecordTranscript(text) {
      const url = urlInput.value.trim();
      if (!url) { setRecordStatus('먼저 연결 설정에서 Apps Script 웹앱 URL을 입력하세요.'); return; }
      setRecordStatus('인식 완료. 확인 중...\n"' + text + '"');
      jsonpRequest(url, { action: 'record', text }, (data) => {
        if (data.error) { setRecordStatus('오류: ' + data.error); appState = 'idle'; resumeWakeListener(); return; }
        askForCorrection(text, data.parsed);
      });
    }

    function handleQueryTranscript(text) {
      const url = urlInput.value.trim();
      if (!url) { setQueryStatus('먼저 연결 설정에서 Apps Script 웹앱 URL을 입력하세요.'); return; }
      setQueryStatus('조회 중...\n"' + text + '"');
      jsonpRequest(url, { action: 'query', text }, (data) => {
        if (data.error) { setQueryStatus('오류: ' + data.error); appState = 'idle'; resumeWakeListener(); return; }
        setQueryStatus(data.summary);
        speakSummary(data.summary);
      });
    }

    const recordRecorder = createToggleRecorder(document.getElementById('recordBtn'), handleRecordTranscript, {
      setStatus: setRecordStatus,
      stopPhrases: ['완료', '여기까지'],
      cancelPhrases: ['취소', '다시'],
      stateName: 'recording',
      listeningLabel: '⏹ 입력완료 (다시 누르면 종료)'
    });
    const queryRecorder = createToggleRecorder(document.getElementById('queryBtn'), handleQueryTranscript, {
      setStatus: setQueryStatus,
      stopPhrases: ['브리핑'],
      cancelPhrases: ['취소', '다시'],
      stateName: 'querying',
      listeningLabel: '⏹ 브리핑 (다시 누르면 종료)'
    });
    document.getElementById('cancelBtn').onclick = () => recordRecorder.cancel();

    const autostart = new URLSearchParams(location.search).get('autostart');
    if (autostart === 'record') document.getElementById('recordBtn').click();
    else if (autostart === 'query') document.getElementById('queryBtn').click();
    else resumeWakeListener();

    // ===================== 방문 달력 =====================
    let calMonthOffset = 0;
    const calGrid = document.getElementById('calGrid');
    const calDayLabels = document.getElementById('calDayLabels');
    const calTitle = document.getElementById('calTitle');
    const calendarResult = document.getElementById('calendarResult');
    ['일', '월', '화', '수', '목', '금', '토'].forEach((d) => {
      const el = document.createElement('div');
      el.className = 'cal-day-label';
      el.textContent = d;
      calDayLabels.appendChild(el);
    });

    function renderCalendar() {
      const base = new Date();
      base.setDate(1);
      base.setMonth(base.getMonth() + calMonthOffset);
      const year = base.getFullYear();
      const month = base.getMonth();
      calTitle.textContent = year + '년 ' + (month + 1) + '월';
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      calGrid.innerHTML = '';
      for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement('div');
        empty.className = 'cal-cell empty';
        calGrid.appendChild(empty);
      }
      for (let d = 1; d <= daysInMonth; d++) {
        const cell = document.createElement('div');
        cell.className = 'cal-cell';
        cell.textContent = d;
        const dateStr = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
        cell.onclick = () => selectCalendarDate(dateStr, cell);
        calGrid.appendChild(cell);
      }
    }

    function selectCalendarDate(dateStr, cell) {
      document.querySelectorAll('.cal-cell.selected').forEach((c) => c.classList.remove('selected'));
      cell.classList.add('selected');
      const url = urlInput.value.trim();
      if (!url) { calendarResult.textContent = '먼저 연결 설정에서 URL을 입력하세요.'; return; }
      calendarResult.textContent = '불러오는 중...';
      jsonpRequest(url, { action: 'calendarDay', date: dateStr }, (data) => {
        if (data.error) { calendarResult.textContent = '오류: ' + data.error; return; }
        if (!data.visits || data.visits.length === 0) { calendarResult.textContent = dateStr + ' 방문 기록이 없습니다.'; return; }
        calendarResult.innerHTML = '';
        data.visits.forEach((v) => {
          const div = document.createElement('div');
          div.className = 'visit-item';
          div.textContent = stripSymbols(v.은행명 + ' ' + v.지점명 + ' - ' + v.판매자명 + (v.방문이력 ? ' (' + v.방문이력 + ')' : ''));
          calendarResult.appendChild(div);
        });
      });
    }

    document.getElementById('calPrev').onclick = () => { calMonthOffset--; renderCalendar(); };
    document.getElementById('calNext').onclick = () => { calMonthOffset++; renderCalendar(); };
    renderCalendar();

    // ===================== 제안서 요청 현황 =====================
    const proposalList = document.getElementById('proposalList');

    function loadProposals() {
      const url = urlInput.value.trim();
      if (!url) { proposalList.textContent = '먼저 연결 설정에서 URL을 입력하세요.'; return; }
      proposalList.textContent = '불러오는 중...';
      jsonpRequest(url, { action: 'listProposals' }, (data) => {
        if (data.error) { proposalList.textContent = '오류: ' + data.error; return; }
        proposalList.innerHTML = '';
        if (!data.items || data.items.length === 0) { proposalList.textContent = '제안서 요청이 없습니다.'; return; }
        data.items.forEach((item) => proposalList.appendChild(buildProposalCard(item, data.header)));
      });
    }

    function buildProposalCard(item, header) {
      const wrap = document.createElement('div');
      wrap.className = 'proposal-card-item';

      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = stripSymbols([item['날짜'], item['은행명'], item['지점명'], item['판매자명']].filter(Boolean).join(' · '));
      wrap.appendChild(meta);

      const editableFields = ['상품명', '가입금액', '고객성명', '고객나이', '고객성별'];
      const inputs = {};
      editableFields.forEach((key) => {
        const group = document.createElement('div');
        group.className = 'field-group';
        const label = document.createElement('label');
        label.textContent = key;
        const input = document.createElement('textarea');
        input.rows = 1;
        input.value = stripSymbols(item[key] || '');
        inputs[key] = input;
        group.appendChild(label);
        group.appendChild(input);
        wrap.appendChild(group);
      });

      let status = item['처리상태'] === '완료' ? '완료' : '대기';
      const pill = document.createElement('div');
      pill.className = 'status-pill ' + status;
      pill.textContent = status === '완료' ? '✓ 완료' : '● 대기 (눌러서 완료 처리)';
      pill.onclick = () => {
        status = status === '대기' ? '완료' : '대기';
        pill.className = 'status-pill ' + status;
        pill.textContent = status === '완료' ? '✓ 완료' : '● 대기 (눌러서 완료 처리)';
        saveProposal();
      };
      wrap.appendChild(pill);

      const saveBtn = document.createElement('button');
      saveBtn.className = 'small-save';
      saveBtn.textContent = '저장';
      saveBtn.onclick = saveProposal;
      wrap.appendChild(saveBtn);

      function saveProposal() {
        const url = urlInput.value.trim();
        const data = {};
        header.forEach((h) => { data[h] = item[h]; });
        editableFields.forEach((key) => { data[key] = inputs[key].value.trim(); });
        data['처리상태'] = status;
        jsonpRequest(url, { action: 'updateProposal', rowIndex: item.rowIndex, data: JSON.stringify(data) }, (res) => {
          if (res.error) { alert('저장 오류: ' + res.error); }
        });
      }

      return wrap;
    }

    document.getElementById('refreshProposalsBtn').onclick = loadProposals;
    loadProposals();
  </script>
</body>
