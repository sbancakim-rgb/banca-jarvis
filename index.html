<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Banca Jarvis</title>
<link rel="manifest" href="manifest.json" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#2b6fd9" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<style>
  body { font-family: sans-serif; text-align: center; padding: 20px; background: #f5f5f7; }
  button { font-size: 18px; padding: 16px 24px; margin: 10px; border-radius: 12px; border: none; color: white; width: 90%; max-width: 320px; }
  #recordBtn { background: #d92b2b; }
  #queryBtn { background: #2b6fd9; }
  #status { margin-top: 16px; font-size: 16px; color: #333; white-space: pre-wrap; }
  input { font-size: 16px; padding: 10px; width: 80%; max-width: 300px; margin-top: 10px; }
</style>
</head>
<body>
  <h2>Banca Jarvis</h2>

  <input id="webAppUrl" placeholder="Apps Script 웹앱 URL을 여기에 붙여넣기" />
  <br/>

  <button id="recordBtn">🎤 정보 기록 (눌러서 말하기)</button>
  <br/>
  <button id="cancelBtn" style="background:#888;">❌ 녹음 취소</button>
  <br/>
  <button id="queryBtn">🏦 지점 조회 (지점명 말하기)</button>

  <div id="status"></div>

  <script>
    const statusEl = document.getElementById('status');
    const urlInput = document.getElementById('webAppUrl');
    urlInput.value = localStorage.getItem('webAppUrl') || '';
    urlInput.addEventListener('change', () => localStorage.setItem('webAppUrl', urlInput.value));

    function speak(text) {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ko-KR';
      speechSynthesis.speak(u);
    }

    const STOP_PHRASES = ['녹음 종료', '입력 종료', '기록 종료'];
    const CANCEL_PHRASES = ['녹음 취소', '입력 취소', '기록 취소'];

    // 버튼을 눌러 시작, 다시 누르거나 "녹음 종료"라고 말하면 끝남.
    // 짧은 침묵에도 끊기지 않도록 continuous 모드 + 끊기면 자동 재시작.
    // "녹음 취소"라고 말하거나 취소 버튼을 누르면 지금까지 들은 내용은 전송하지 않고 버림.
    function createToggleRecorder(btn, onFinish) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        statusEl.textContent = '이 브라우저는 음성인식을 지원하지 않습니다. 크롬을 사용하세요.';
        return { cancel: () => {} };
      }

      let rec = null;
      let listening = false;
      let manualStop = false;
      let cancelled = false;
      let chunks = [];
      const defaultLabel = btn.textContent;

      function stripPhrase(text, phrases) {
        let found = false;
        let cleaned = text;
        phrases.forEach((p) => {
          if (cleaned.indexOf(p) !== -1) {
            found = true;
            cleaned = cleaned.replace(p, '').trim();
          }
        });
        return { found, cleaned };
      }

      function finish() {
        manualStop = true;
        if (rec) rec.stop();
      }

      function cancel() {
        if (!listening) return;
        cancelled = true;
        manualStop = true;
        if (rec) rec.stop();
      }

      function start() {
        chunks = [];
        manualStop = false;
        cancelled = false;
        listening = true;
        btn.textContent = '⏹ 종료 (다시 누르거나 "녹음 종료"라고 말하기)';
        statusEl.textContent = '듣고 있습니다... (취소하려면 취소 버튼 또는 "녹음 취소"라고 말하세요)';

        rec = new SpeechRecognition();
        rec.lang = 'ko-KR';
        rec.continuous = true;
        rec.interimResults = false;

        rec.onresult = (e) => {
          for (let i = e.resultIndex; i < e.results.length; i++) {
            if (!e.results[i].isFinal) continue;
            const raw = e.results[i][0].transcript;
            const cancelCheck = stripPhrase(raw, CANCEL_PHRASES);
            if (cancelCheck.found) { cancel(); return; }
            const { found: stopped, cleaned } = stripPhrase(raw, STOP_PHRASES);
            if (cleaned) chunks.push(cleaned);
            if (stopped) finish();
          }
        };

        rec.onerror = (e) => {
          if (e.error === 'no-speech') return; // 침묵은 무시하고 계속 듣기
          statusEl.textContent = '인식 오류: ' + e.error;
        };

        rec.onend = () => {
          if (!manualStop && listening) {
            rec.start(); // 끊기면 자동 재시작 (계속 듣기)
            return;
          }
          listening = false;
          btn.textContent = defaultLabel;
          if (cancelled) {
            statusEl.textContent = '녹음을 취소했습니다.';
            return;
          }
          const fullText = chunks.join(' ').trim();
          if (fullText) onFinish(fullText);
          else statusEl.textContent = '인식된 내용이 없습니다.';
        };

        rec.start();
      }

      btn.onclick = () => {
        if (!listening) start();
        else finish();
      };

      return { cancel };
    }

    let jsonpCounter = 0;
    function jsonpRequest(baseUrl, params, onData) {
      const callbackName = 'jsonpCb' + (jsonpCounter++);
      const timeout = setTimeout(() => {
        cleanup();
        statusEl.textContent = '오류: 응답 시간 초과 (URL 또는 배포 설정을 확인하세요)';
      }, 20000);

      function cleanup() {
        clearTimeout(timeout);
        delete window[callbackName];
        script.remove();
      }

      window[callbackName] = (data) => { cleanup(); onData(data); };

      const qs = new URLSearchParams({ ...params, callback: callbackName }).toString();
      const script = document.createElement('script');
      script.src = baseUrl + (baseUrl.indexOf('?') >= 0 ? '&' : '?') + qs;
      script.onerror = () => { cleanup(); statusEl.textContent = '오류: 요청 실패 (URL을 확인하세요)'; };
      document.body.appendChild(script);
    }

    function send(action, text) {
      const url = urlInput.value.trim();
      if (!url) { statusEl.textContent = '먼저 Apps Script 웹앱 URL을 입력하세요.'; return; }
      statusEl.textContent = '처리 중...\n"' + text + '"';
      jsonpRequest(url, { action, text }, (data) => {
        if (data.error) { statusEl.textContent = '오류: ' + data.error; return; }
        if (action === 'record') {
          statusEl.textContent = '기록 완료:\n' + JSON.stringify(data.saved, null, 2);
          speak('기록했습니다.');
        } else {
          statusEl.textContent = data.summary;
          speak(data.summary);
        }
      });
    }

    const recordRecorder = createToggleRecorder(document.getElementById('recordBtn'), (t) => send('record', t));
    createToggleRecorder(document.getElementById('queryBtn'), (t) => send('query', t));
    document.getElementById('cancelBtn').onclick = () => recordRecorder.cancel();

    // URL에 ?autostart=record 또는 ?autostart=query를 붙여서 열면 자동으로 녹음 시작
    // (구글 어시스턴트 루틴으로 "방카 자비스" 음성 명령 시 이 URL을 열도록 설정)
    const autostart = new URLSearchParams(location.search).get('autostart');
    if (autostart === 'record') document.getElementById('recordBtn').click();
    if (autostart === 'query') document.getElementById('queryBtn').click();
  </script>
</body>
</html>
